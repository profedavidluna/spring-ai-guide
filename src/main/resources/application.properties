# =============================================
# Spring AI Guide - Configuración principal
# =============================================

spring.application.name=spring-ai-guide

server.port=8080

# =============================================
# OpenAI - Spring AI Configuration
# =============================================
# Configura tu API key de OpenAI aquí o usa la variable de entorno:
#   export SPRING_AI_OPENAI_API_KEY=sk-...
#
# Obtén tu API key en: https://platform.openai.com/api-keys
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:tu-api-key-aqui}

# Modelo a usar (gpt-4o-mini es más económico para demos)
spring.ai.openai.chat.options.model=gpt-4o-mini

# Temperatura: 0.0 = determinístico, 1.0 = más creativo
spring.ai.openai.chat.options.temperature=0.7

# =============================================
# Logging
# =============================================
logging.level.com.example.springaiguide=DEBUG
